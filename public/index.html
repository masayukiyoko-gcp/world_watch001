<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>世界時計 - Minimal</title>
  <link rel="stylesheet" href="styles.css">
 </head>
<body>
  <main>
    <h1>世界時計（Minimal）</h1>
    <div class="clocks">
      <section class="clock" id="clock-UTC">
        <h2>UTC</h2>
        <div class="time" aria-live="polite">--:--:--</div>
      </section>

      <section class="clock" id="clock-Tokyo">
        <h2>Asia/Tokyo</h2>
        <div class="time" aria-live="polite">--:--:--</div>
      </section>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
