name: Copilot Issue Runner

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  run-task:
    if: contains(github.event.label.name, 'copilot')
    runs-on: ubuntu-latest
    steps:
      - name: Announce start
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `copilot: 自動実行を開始します。`,
            })

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Start static server for Cypress
        run: |
          npx http-server public -p 8080 &
        env:
          PORT: 8080

      - name: Run unit tests (capture output)
        id: unit
        run: |
          mkdir -p artifacts || true
          npm test 2>&1 | tee artifacts/unit-test-output.txt
        continue-on-error: true

      - name: Upload unit test output
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: artifacts/unit-test-output.txt

      - name: Run Cypress E2E (capture output)
        id: cypress
        run: |
          mkdir -p cypress/results artifacts || true
          npx cypress run --headless 2>&1 | tee artifacts/cypress-output.txt
        continue-on-error: true

      - name: Upload Cypress artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            artifacts/cypress-output.txt
            cypress/screenshots/**
            cypress/videos/**
            cypress/results/**

      - name: Post results and finalize
        uses: actions/github-script@v6
        with:
          script: |
            const unitSuccess = (typeof steps !== 'undefined' && steps && steps.unit && steps.unit.conclusion === 'success');
            const cypressSuccess = (typeof steps !== 'undefined' && steps && steps.cypress && steps.cypress.conclusion === 'success');
            const success = unitSuccess && cypressSuccess;
            if (success) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['copilot/done']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `copilot: 自動実行が完了しました。ユニット・E2Eともに成功しました。アーティファクトを添付しました。`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['copilot/failed'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `copilot: 自動実行でエラーが発生しました。テストログとスクリーンショットをアーティファクトとして添付しました。`
              });
            }
