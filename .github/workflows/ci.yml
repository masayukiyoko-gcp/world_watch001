name: CI - Tests & E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: |
          if npm run | grep -q "test:unit"; then
            npm run test:unit -- --coverage || exit 1
          else
            echo "No test:unit script defined; running npm test" && npm test -- --coverage || exit 1
          fi
      - name: Upload coverage (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage || coverage

  e2e-visual:
    name: E2E visual tests (Cypress)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run Cypress tests
        run: |
          if npm run | grep -q "cypress"; then
            npx cypress run || exit 1
          else
            echo "Cypress not configured; skip" && exit 1
          fi
      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots || cypress/screenshots

  enforce-screenshots:
    name: Enforce screenshot attachment for display changes
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Check PR files and require screenshots for UI changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const files = await github.paginate(github.rest.pulls.listFiles, {owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number});
            const changed = files.map(f => f.filename);
            const uiChanged = changed.some(p => p.startsWith('src/') || p.startsWith('docs/design/') || p.includes('index.html') );
            const hasScreenshot = changed.some(p => p.startsWith('screenshots/') || p.startsWith('cypress/screenshots/') || p.startsWith('docs/design/screenshots/'));
            if (uiChanged && !hasScreenshot) {
              core.setFailed('UI-related files changed but no screenshot attached in the PR. Please attach screenshots under screenshots/ or cypress/screenshots/');
            }

  require-status:
    name: Final check
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-visual, enforce-screenshots]
    steps:
      - name: Done
        run: echo "All checks passed or executed (see previous jobs)."
